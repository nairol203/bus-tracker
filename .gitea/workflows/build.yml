name: Build and Push the Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npx prettier --check .

      - name: Run Linter
        run: npm run lint

  build-and-push:
    needs: lint-and-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Gitea container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: git.nairol.de
          username: ${{ gitea.repository_owner }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Log in to GitHub container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ gitea.repository_owner }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            git.nairol.de/${{ gitea.repository }}
            ghcr.io/${{ gitea.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: |
            network=action-runner

      - name: Build and push the image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ gitea.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=git.nairol.de/${{ gitea.repository }}:buildcache
          cache-to: type=registry,ref=git.nairol.de/${{ gitea.repository }}:buildcache,mode=max
